<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>郵件助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--border:#2e3248;
    --accent:#5b8af5;--accent2:#7c5bf5;--green:#3ecf8e;
    --red:#f5614a;--yellow:#f5c842;--text:#e8eaf6;--text2:#8b90b0;--text3:#555a7a;
    --radius:16px;--radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:420px;margin:0 auto;overflow-x:hidden;}

  #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;background:radial-gradient(ellipse at 50% 0%,rgba(91,138,245,0.15) 0%,transparent 60%);}
  .login-logo{font-size:56px;margin-bottom:16px;}
  .login-title{font-size:28px;font-weight:700;margin-bottom:8px;}
  .login-title span{color:var(--accent);}
  .login-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:32px;}
  .login-features{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:28px;}
  .login-feature{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text2);}
  .login-feature:last-child{border-bottom:none;}
  .btn-google{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
  .btn-google:active{transform:scale(.97);}
  .login-note{font-size:11px;color:var(--text3);margin-top:10px;text-align:center;}

  #app-shell{display:none;}
  .topbar{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.92);backdrop-filter:blur(16px);padding:12px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .topbar-title{font-size:17px;font-weight:700;}
  .topbar-title span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .topbar-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
  .conn-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);margin-top:2px;}
  .conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;}

  .tabs{display:flex;padding:10px 14px 0;gap:5px;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;font-family:inherit;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tab .count{display:inline-block;background:rgba(255,255,255,.2);font-size:10px;padding:1px 5px;border-radius:10px;margin-left:3px;}

  .page{display:none;padding:12px 14px 100px;}
  .page.active{display:block;}

  .loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px;}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:var(--text2);}

  .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;margin-top:10px;}
  .sec-title{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  .sec-action{font-size:12px;color:var(--accent);cursor:pointer;}

  .mail-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .mail-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .mail-card.urgent::before{background:var(--red);}
  .mail-card.course::before{background:var(--yellow);}
  .mail-card.finance::before{background:var(--green);}
  .mail-card.info::before{background:var(--accent);}
  .mail-card.ad::before{background:var(--text3);}
  .mail-card:active{transform:scale(.985);}
  .mail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .mail-sender{font-size:13px;font-weight:600;flex:1;}
  .mail-date{font-size:11px;color:var(--text3);flex-shrink:0;}
  .mail-subject{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.4;}
  .mail-snippet{font-size:12px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mail-tags{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:2px 7px;border-radius:7px;font-weight:500;}
  .tag.urgent{background:rgba(245,97,74,.15);color:var(--red);}
  .tag.course{background:rgba(245,200,66,.15);color:var(--yellow);}
  .tag.finance{background:rgba(62,207,142,.15);color:var(--green);}
  .tag.info{background:rgba(91,138,245,.15);color:var(--accent);}
  .tag.ad{background:rgba(85,90,122,.15);color:var(--text3);}
  .tag.unread{background:rgba(91,138,245,.2);color:var(--accent);}
  .mail-actions{display:flex;gap:5px;margin-top:8px;}
  .btn-sm{flex:1;padding:7px 0;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit;}
  .btn-sm:active{transform:scale(.96);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-danger{background:rgba(245,97,74,.12);color:var(--red);border:1.5px solid rgba(245,97,74,.25);}
  .btn-ghost{background:var(--surface2);color:var(--text2);}
  .btn-yellow{background:rgba(245,200,66,.12);color:var(--yellow);border:1.5px solid rgba(245,200,66,.25);}
  .btn-green{background:rgba(62,207,142,.12);color:var(--green);border:1.5px solid rgba(62,207,142,.25);}

  .alert-banner{background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(245,97,74,.06));border:1.5px solid rgba(245,200,66,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
  .alert-icon{font-size:20px;flex-shrink:0;}
  .alert-title{font-size:14px;font-weight:700;color:var(--yellow);}
  .alert-body{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}

  .search-box{position:relative;margin-bottom:12px;}
  .search-input{width:100%;padding:11px 16px 11px 38px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

  .member-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
  .stat-num{font-size:24px;font-weight:700;color:var(--accent);}
  .stat-label{font-size:11px;color:var(--text3);margin-top:2px;}

  .group-tab-row{display:flex;gap:6px;margin-bottom:12px;}
  .group-tab{flex:1;padding:8px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;}
  .group-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .member-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
  .member-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
  .member-info{flex:1;}
  .member-name{font-size:13px;font-weight:500;}
  .member-email{font-size:11px;color:var(--text3);margin-top:1px;}

  .settings-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
  .settings-row{padding:12px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
  .settings-row:last-child{border-bottom:none;}
  .settings-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
  .settings-info{flex:1;}
  .settings-label{font-size:14px;font-weight:500;}
  .settings-sub{font-size:12px;color:var(--text3);margin-top:2px;}
  .toggle{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .toggle.on{background:var(--accent);}
  .toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;}
  .toggle.on::after{transform:translateX(18px);}
  .keyword-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .keyword-chip{background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;}
  .chip-del{color:var(--text3);cursor:pointer;}
  .chip-add{background:transparent;border:1.5px dashed var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);cursor:pointer;}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(15,17,23,0.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:6px 0 18px;z-index:100;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 0;color:var(--text3);transition:color .2s;}
  .nav-item.active{color:var(--accent);}
  .nav-icon{font-size:20px;}
  .nav-label{font-size:10px;font-weight:500;}

  .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1.5px solid var(--border);border-radius:22px 22px 0 0;padding:18px 18px 36px;width:100%;max-width:420px;animation:slideUp .3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:10px;}
  .modal-body{font-size:14px;color:var(--text2);line-height:1.6;white-space:pre-line;}
  .modal-actions{display:flex;gap:8px;margin-top:14px;}
  .btn-full{flex:1;padding:12px 0;border-radius:var(--radius-sm);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-full:active{transform:scale(.97);}
  .btn-confirm{background:var(--accent);color:#fff;}
  .btn-cancel{background:var(--surface2);color:var(--text2);}

  .forward-group-select{display:flex;gap:6px;margin-top:12px;}
  .fgs-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s;}
  .fgs-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
  .fgs-btn.selected-green{background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green);}

  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.8;}
  .empty-icon{font-size:36px;margin-bottom:10px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">📬</div>
  <div class="login-title">郵件<span>助手</span></div>
  <div class="login-sub">澎湖縣職能治療師公會<br>信件管理與會員轉發系統</div>
  <div class="login-features">
    <div class="login-feature"><span>📥</span> 未讀信件自動分類</div>
    <div class="login-feature"><span>🔍</span> 全部信件搜尋</div>
    <div class="login-feature"><span>📢</span> 課程信件偵測轉發</div>
    <div class="login-feature"><span>👥</span> 一般會員 / 理監事兩組名單</div>
  </div>
  <button class="btn-google" onclick="startLogin()">🔗 使用 Gmail 帳號登入</button>
  <div class="login-note">僅讀取、發送你授權的郵件，不儲存任何資料</div>
</div>

<div id="app-shell">
  <div class="topbar">
    <div>
      <div class="topbar-title">郵件<span>助手</span></div>
      <div class="conn-status"><div class="conn-dot"></div><span id="topbar-email">載入中...</span></div>
    </div>
    <div class="topbar-right">
      <div class="topbar-badge" id="unread-badge">讀取中</div>
      <div class="user-avatar" id="user-avatar" onclick="confirmLogout()">?</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('inbox');setNav('inbox')">未讀 <span class="count" id="tab-inbox-count">...</span></button>
    <button class="tab" onclick="switchTab('all');setNav('all');initAllTab()">全部信件</button>
    <button class="tab" onclick="switchTab('course');setNav('course')">課程轉發 <span class="count" id="tab-course-count">0</span></button>
    <button class="tab" onclick="switchTab('members');setNav('members')">會員名單</button>
    <button class="tab" onclick="switchTab('settings');setNav('settings')">設定</button>
  </div>

  <!-- 未讀 -->
  <div class="page active" id="page-inbox">
    <div id="inbox-loading" class="loading-wrap"><div class="spinner"></div><div class="loading-text">正在讀取信件...</div></div>
    <div id="inbox-content" style="display:none;margin-top:12px"></div>
  </div>

  <!-- 全部信件 -->
  <div class="page" id="page-all">
    <div style="margin-top:12px">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="搜尋主旨、寄件人、內容..." oninput="onSearch(this.value)">
      </div>
      <div id="all-loading" class="loading-wrap" style="display:none"><div class="spinner"></div><div class="loading-text">載入中...</div></div>
      <div id="all-content"></div>
    </div>
  </div>

  <!-- 課程轉發 -->
  <div class="page" id="page-course">
    <div style="margin-top:12px" id="course-content">
      <div class="empty-state"><div class="empty-icon">📭</div>尚未偵測到課程信件</div>
    </div>
  </div>

  <!-- 會員名單 -->
  <div class="page" id="page-members">
    <div style="margin-top:12px">
      <div class="member-stats">
        <div class="stat-card"><div class="stat-num" id="member-count-general">27</div><div class="stat-label">一般會員</div></div>
        <div class="stat-card"><div class="stat-num" id="member-count-board">12</div><div class="stat-label">理監事</div></div>
      </div>
      <div class="group-tab-row">
        <button class="group-tab active" id="gtab-general" onclick="switchMemberGroup('general')">👥 一般會員（27人）</button>
        <button class="group-tab" id="gtab-board" onclick="switchMemberGroup('board')">🏛 理監事（12人）</button>
      </div>
      <div id="member-list"></div>
    </div>
  </div>

  <!-- 設定 -->
  <div class="page" id="page-settings">
    <div style="margin-top:12px">
      <div class="sec-header"><div class="sec-title">🔗 帳號</div></div>
      <div class="settings-section">
        <div class="settings-row">
          <div class="settings-icon">📧</div>
          <div class="settings-info"><div class="settings-label">Gmail 帳號</div><div class="settings-sub" id="settings-email">未登入</div></div>
        </div>
        <div class="settings-row" style="cursor:pointer" onclick="loadInbox()">
          <div class="settings-icon">🔄</div>
          <div class="settings-info"><div class="settings-label">重新整理信件</div></div>
        </div>
        <div class="settings-row" style="cursor:pointer" onclick="confirmLogout()">
          <div class="settings-icon">🚪</div>
          <div class="settings-info"><div class="settings-label" style="color:var(--red)">登出</div></div>
        </div>
      </div>
      <div class="sec-header"><div class="sec-title">📡 課程偵測關鍵字</div></div>
      <div class="settings-section">
        <div class="settings-row">
          <div class="settings-icon">🏷</div>
          <div class="settings-info">
            <div class="settings-label">主旨關鍵字</div>
            <div class="keyword-chips" id="keyword-chips"></div>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-icon">📮</div>
          <div class="settings-info">
            <div class="settings-label">固定寄件人</div>
            <div class="keyword-chips" id="sender-chips"></div>
          </div>
        </div>
      </div>
      <div class="sec-header"><div class="sec-title">⚙️ 轉發設定</div></div>
      <div class="settings-section">
        <div class="settings-row">
          <div class="settings-icon">🔔</div>
          <div class="settings-info"><div class="settings-label">轉發前通知我</div><div class="settings-sub">等待確認再發送</div></div>
          <div class="toggle on" id="toggle-confirm" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="settings-row">
          <div class="settings-icon">📝</div>
          <div class="settings-info"><div class="settings-label">自動加上【轉發】前綴</div></div>
          <div class="toggle on" id="toggle-prefix" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" id="nav-inbox" onclick="switchTab('inbox');setNav('inbox')"><div class="nav-icon">📥</div><div class="nav-label">未讀</div></div>
    <div class="nav-item" id="nav-all" onclick="switchTab('all');setNav('all');initAllTab()"><div class="nav-icon">📋</div><div class="nav-label">全部</div></div>
    <div class="nav-item" id="nav-course" onclick="switchTab('course');setNav('course')"><div class="nav-icon">📢</div><div class="nav-label">課程</div></div>
    <div class="nav-item" id="nav-members" onclick="switchTab('members');setNav('members')"><div class="nav-icon">👥</div><div class="nav-label">會員</div></div>
    <div class="nav-item" id="nav-settings" onclick="switchTab('settings');setNav('settings')"><div class="nav-icon">⚙️</div><div class="nav-label">設定</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div id="modal-extra"></div>
    <div class="modal-actions">
      <button class="btn-full btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-full btn-confirm" id="modal-confirm">確認</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '226682198972-d7s6q22h1niuek9u5te78u5br52vi820.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.modify';

let accessToken = null, userEmail = '', detectedMessages = [], forwardCount = 0;
let keywords = ['課程','研習','工作坊','講座'];
let senderFilters = [];
let allEmailsCache = [], allLoaded = false;
let currentMemberGroup = 'general';

const membersGeneral = [
  {name:'徐晏文',email:'she0628@gmail.com'},

// ── AUTH ──
function startLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('❌ 登入失敗：' + resp.error); return; }
      accessToken = resp.access_token;
      const profile = await gmailFetch('https://www.googleapis.com/gmail/v1/users/me/profile');
      userEmail = profile.emailAddress || '';
      document.getElementById('topbar-email').textContent = userEmail;
      document.getElementById('settings-email').textContent = userEmail + ' ✅';
      document.getElementById('user-avatar').textContent = userEmail.charAt(0).toUpperCase();
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-shell').style.display = 'block';
      renderKeywords(); renderSenders(); renderMembers(); loadInbox();
    }
  });
  client.requestAccessToken();
}

function confirmLogout() {
  openModal('登出帳號','確定要登出 '+userEmail+' 嗎？','登出',()=>{
    accessToken=null;
    document.getElementById('app-shell').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    showToast('已登出');
  });
}

async function gmailFetch(url, options={}) {
  const res = await fetch(url,{...options,headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json',...(options.headers||{})}});
  return res.json();
}

// ── INBOX ──
async function loadInbox() {
  document.getElementById('inbox-loading').style.display='flex';
  document.getElementById('inbox-content').style.display='none';
  try {
    const data = await gmailFetch('https://www.googleapis.com/gmail/v1/users/me/messages?labelIds=INBOX&q=is:unread&maxResults=30');
    const messages = data.messages || [];
    document.getElementById('unread-badge').textContent = messages.length+' 未讀';
    document.getElementById('tab-inbox-count').textContent = messages.length;
    const details = await Promise.all(messages.slice(0,20).map(m=>
      gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`)
    ));
    renderInbox(details); detectCourse(details);
  } catch(e) { showToast('❌ 讀取失敗'); }
  document.getElementById('inbox-loading').style.display='none';
  document.getElementById('inbox-content').style.display='block';
}

function getHeader(msg,name){return (msg.payload?.headers||[]).find(h=>h.name===name)?.value||'';}
function formatDate(d){
  if(!d)return'';
  const dt=new Date(d),now=new Date();
  return dt.toDateString()===now.toDateString()?'今天':(dt.getMonth()+1)+'/'+dt.getDate();
}
function classifyEmail(subject,from){
  if(keywords.some(k=>subject.includes(k))||senderFilters.some(s=>from.toLowerCase().includes(s.toLowerCase())))return'course';
  if(/發票|對帳單|訂單|付款|申購/.test(subject))return'finance';
  if(/render|github|railway|failed|exceeded/i.test(from))return'urgent';
  if(/pinterest|gaiconf|readingoutpost|notion.*mail/i.test(from)||/廣告|電子報|推薦|特訓|活動|小聚/i.test(subject))return'ad';
  return'info';
}
function typeLabel(t){return{urgent:'緊急',course:'課程偵測',finance:'財務',ad:'廣告',info:'一般'}[t]||t;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function mailCardHtml(msg,subject,from,date,type,showUnread){
  const sender=from.replace(/<[^>]+>/,'').replace(/"/g,'').trim()||from;
  return `<div class="mail-card ${type}">
    <div class="mail-top"><div class="mail-sender">${esc(sender.substring(0,22))}</div><div class="mail-date">${date}</div></div>
    <div class="mail-subject">${esc(subject.substring(0,52))}</div>
    <div class="mail-snippet">${esc((msg.snippet||'').substring(0,60))}</div>
    <div class="mail-tags"><span class="tag ${type}">${typeLabel(type)}</span>${showUnread?'<span class="tag unread">未讀</span>':''}</div>
    <div class="mail-actions">
      <button class="btn-sm btn-ghost" onclick="markRead('${msg.id}',this)">標記已讀</button>
      <button class="btn-sm btn-danger" onclick="trashMail('${msg.id}',this)">🗑 刪除</button>
    </div>
  </div>`;
}

function renderInbox(messages){
  const groups={urgent:[],course:[],finance:[],info:[],ad:[]};
  messages.forEach(msg=>{
    const subject=getHeader(msg,'Subject')||'（無主旨）';
    const from=getHeader(msg,'From')||'';
    const date=formatDate(getHeader(msg,'Date'));
    const type=classifyEmail(subject,from);
    groups[type].push({msg,subject,from,date,type});
  });
  const labels={urgent:['⚠️','需要關注'],course:['📢','課程偵測'],finance:['💰','財務帳務'],info:['📨','一般信件'],ad:['🗑','廣告 / 電子報']};
  let html='';
  Object.entries(labels).forEach(([type,[icon,label]])=>{
    if(!groups[type].length)return;
    html+=`<div class="sec-header"><div class="sec-title">${icon} ${label}</div></div>`;
    groups[type].forEach(({msg,subject,from,date,type})=>{ html+=mailCardHtml(msg,subject,from,date,type,false); });
  });
  if(!html)html='<div class="empty-state"><div class="empty-icon">🎉</div>沒有未讀信件！</div>';
  document.getElementById('inbox-content').innerHTML=html;
}

async function markRead(id,btn){
  btn.textContent='處理中...';btn.disabled=true;
  await gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}/modify`,{method:'POST',body:JSON.stringify({removeLabelIds:['UNREAD']})});
  btn.closest('.mail-card').style.opacity='0.4';
  showToast('✅ 已標記已讀');
}
async function trashMail(id,btn){
  btn.textContent='處理中...';btn.disabled=true;
  await gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}/trash`,{method:'POST'});
  btn.closest('.mail-card').style.opacity='0.4';
  showToast('🗑 已移至垃圾桶');
}

// ── ALL EMAILS ──
async function initAllTab(){
  if(allLoaded)return;
  document.getElementById('all-loading').style.display='flex';
  try{
    const data=await gmailFetch('https://www.googleapis.com/gmail/v1/users/me/messages?labelIds=INBOX&maxResults=40');
    const messages=data.messages||[];
    const details=await Promise.all(messages.slice(0,30).map(m=>
      gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`)
    ));
    allEmailsCache=details; allLoaded=true;
    renderAllEmails(details);
  }catch(e){showToast('❌ 載入失敗');}
  document.getElementById('all-loading').style.display='none';
}

function renderAllEmails(messages){
  const c=document.getElementById('all-content');
  if(!messages.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div>沒有信件</div>';return;}
  c.innerHTML=messages.map(msg=>{
    const subject=getHeader(msg,'Subject')||'（無主旨）';
    const from=getHeader(msg,'From')||'';
    const date=formatDate(getHeader(msg,'Date'));
    const type=classifyEmail(subject,from);
    const isUnread=msg.labelIds?.includes('UNREAD');
    return`<div style="${isUnread?'':'opacity:0.65'}">`+mailCardHtml(msg,subject,from,date,type,isUnread)+`</div>`;
  }).join('');
}

let searchTimer;
function onSearch(q){
  clearTimeout(searchTimer);
  if(!q.trim()){if(allLoaded)renderAllEmails(allEmailsCache);return;}
  searchTimer=setTimeout(async()=>{
    document.getElementById('all-loading').style.display='flex';
    document.getElementById('all-content').innerHTML='';
    try{
      const data=await gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages?q=${encodeURIComponent(q)}&maxResults=20`);
      const messages=data.messages||[];
      if(!messages.length){
        document.getElementById('all-content').innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div>找不到相關信件</div>';
        document.getElementById('all-loading').style.display='none';return;
      }
      const details=await Promise.all(messages.map(m=>
        gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`)
      ));
      renderAllEmails(details);
    }catch(e){showToast('❌ 搜尋失敗');}
    document.getElementById('all-loading').style.display='none';
  },500);
}

// ── COURSE ──
function detectCourse(messages){
  detectedMessages=messages.filter(msg=>{
    const s=getHeader(msg,'Subject')||'';
    const f=getHeader(msg,'From')||'';
    return classifyEmail(s,f)==='course';
  });
  document.getElementById('tab-course-count').textContent=detectedMessages.length;
  const container=document.getElementById('course-content');
  if(!detectedMessages.length){container.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div>尚未偵測到課程信件</div>';return;}
  let html=`<div class="alert-banner"><div class="alert-icon">📋</div><div><div class="alert-title">偵測到 ${detectedMessages.length} 封課程信件</div><div class="alert-body">請選擇轉發對象後確認發送</div></div></div>`;
  detectedMessages.forEach(msg=>{
    const subject=getHeader(msg,'Subject')||'（無主旨）';
    const from=getHeader(msg,'From')||'';
    const date=formatDate(getHeader(msg,'Date'));
    const sender=from.replace(/<[^>]+>/,'').replace(/"/g,'').trim();
    html+=`<div class="mail-card course">
      <div class="mail-top"><div class="mail-sender">${esc(sender.substring(0,22))}</div><div class="mail-date">${date}</div></div>
      <div class="mail-subject">${esc(subject.substring(0,52))}</div>
      <div class="mail-snippet">${esc((msg.snippet||'').substring(0,60))}</div>
      <div class="mail-tags"><span class="tag course">課程偵測</span></div>
      <div style="margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:8px;">
        <div style="font-size:11px;color:var(--text3);margin-bottom:3px;">轉發預覽</div>
        <div style="font-size:13px;color:var(--text2);">【轉發】${esc(subject.substring(0,38))}</div>
      </div>
      <div class="mail-actions">
        <button class="btn-sm btn-primary" onclick="showForwardModal('${msg.id}','${esc(subject).replace(/'/g,"\\'")}')">✅ 選擇轉發對象</button>
        <button class="btn-sm btn-danger" onclick="this.closest('.mail-card').remove();showToast('已略過')">略過</button>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

let pendingForwardId='', pendingForwardSubject='', selectedGroup='both';

function showForwardModal(msgId, subject){
  pendingForwardId=msgId; pendingForwardSubject=subject; selectedGroup='both';
  document.getElementById('modal-title').textContent='選擇轉發對象';
  document.getElementById('modal-body').textContent='主旨：【轉發】'+subject;
  document.getElementById('modal-extra').innerHTML=`
    <div class="forward-group-select">
      <button class="fgs-btn selected" id="fgs-general" onclick="selectGroup('general')">👥 一般會員<br><span style="font-size:11px;opacity:.7">27 人</span></button>
      <button class="fgs-btn" id="fgs-board" onclick="selectGroup('board')">🏛 理監事<br><span style="font-size:11px;opacity:.7">12 人</span></button>
      <button class="fgs-btn selected" id="fgs-both" onclick="selectGroup('both')">📢 全部<br><span style="font-size:11px;opacity:.7">27 人</span></button>
    </div>`;
  document.getElementById('modal-confirm').textContent='✅ 確認發送';
  document.getElementById('modal-confirm').onclick=()=>{doForward(pendingForwardId,pendingForwardSubject,selectedGroup);closeModal();};

function selectGroup(g){
  selectedGroup=g;
  ['general','board','both'].forEach(x=>{
    document.getElementById('fgs-'+x).classList.remove('selected');
  });
  document.getElementById('fgs-'+g).classList.add('selected');
}

async function doForward(msgId,subject,group){
  const targets = group==='general'?membersGeneral : group==='board'?membersBoard : membersGeneral;
  const groupName = group==='general'?'一般會員' : group==='board'?'理監事' : '全部會員';
  showToast('發送中，請稍候...');
  const usePrefix=document.getElementById('toggle-prefix').classList.contains('on');
  const finalSubject=(usePrefix?'【轉發】':'')+subject;
  let originalBody='';
  try{
    const fullMsg=await gmailFetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${msgId}?format=full`);
    const findBody=(part)=>{
      if(!part)return'';
      if(part.mimeType==='text/html'&&part.body?.data)return atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/'));
      if(part.mimeType==='text/plain'&&part.body?.data)return'<pre>'+atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/'))+'</pre>';
      if(part.parts){for(const p of part.parts){const r=findBody(p);if(r)return r;}}
      return'';
    };
    originalBody=findBody(fullMsg.payload)||`<p>${fullMsg.snippet||''}</p>`;
  }catch(e){originalBody='<p>（無法載入原始信件內容）</p>';}

  const emailHtml=`<div style="font-family:'Noto Sans TC',Arial,sans-serif;font-size:14px;color:#333;line-height:1.8;">
  <p>各位會員好：</p>
  <p>如標題附件，請參考，謝謝。</p>
  <hr style="border:none;border-top:1px solid #ddd;margin:16px 0;">
  ${originalBody}
  <hr style="border:none;border-top:1px solid #ddd;margin:16px 0;">
  <p style="color:#555;font-size:13px;line-height:2;">
    社團法人澎湖縣職能治療師公會<br>
    880澎湖縣馬公市光榮里縣府新村23號1樓<br>
    理事長 林聖凱<br>
    總幹事 林蘭蕙<br>
    電話：0932463513<br>
    E-mail：<a href="mailto:pehotu.office@gmail.com">pehotu.office@gmail.com</a>
  </p>
</div>`;

  let ok=0;
  for(const m of targets){
    try{
      const raw=makeEmail(m.email,finalSubject,emailHtml);
      await gmailFetch('https://www.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',body:JSON.stringify({raw})});
      ok++;
    }catch(e){}
  }
  forwardCount+=ok;
  showToast(`✅ 已轉發給 ${groupName} ${ok} 人！`);
}

function makeEmail(to,subject,html){
  const msg=['To: '+to,'From: '+userEmail,'Subject: =?UTF-8?B?'+btoa(unescape(encodeURIComponent(subject)))+'?=','MIME-Version: 1.0','Content-Type: text/html; charset=UTF-8','',html].join('\r\n');
  return btoa(unescape(encodeURIComponent(msg))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function switchTab(tab){

function setNav(tab){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}
function openModal(title,body,confirmText,action){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=body;
  document.getElementById('modal-extra').innerHTML='';
  document.getElementById('modal-confirm').textContent=confirmText;
  document.getElementById('modal-confirm').onclick=()=>{action();closeModal();};
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
